<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify - Accedi</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body
    class="bg-black min-vh-100 d-flex flex-column align-items-center justify-content-center py-5"
  >
    <div class="w-100 px-3" style="max-width: 440px">
      <div class="text-center mb-3">
        <i class="bi bi-spotify text-light" style="font-size: 80px"></i>
      </div>

      <!-- Titolo -->
      <h1
        class="text-light text-center mb-4"
        style="font-size: 40px; line-height: 1.2"
      >
        Log in to continue
      </h1>

      <!-- FORM -->

      <form id="loginForm" novalidate>
        <!--personalizzare i messaggi di errore email e password-->

        <!-- EMAIL -->

        <div class="mb-3">
          <label for="emailInput" class="text-white mb-2 mt-2"
            >E-mail or Username</label
          >
          <input
            type="email"
            id="emailInput"
            name="email"
            class="form-control bg-black text-light border border-secondary rounded-2 py-2 px-3"
            placeholder="E-mail or Username"
            autocomplete="username"
          />
        </div>

        <!-- PASSWORD -->

        <div class="mb-3">
          <label for="passwordInput" class="text-white mb-2 mt-2"
            >Password</label
          >
          <div class="position-relative">
            <input
              type="password"
              id="passwordInput"
              name="password"
              class="form-control bg-black text-white border border-secondary rounded-2 py-2 px-3 pe-5"
              placeholder="Password"
              autocomplete="current-password"
            />
            <button
              type="button"
              id="togglePassword"
              class="btn btn-link position-absolute top-50 end-0 translate-middle-y pe-3 text-secondary text-decoration-none"
              tabindex="-1"
            >
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <div class="text-end mb-4">
          <a href="#" class="text-white text-decoration-underline mb-"
            >Forgot Password?</a
          >
        </div>

        <!-- BTN ACCEDI -->

        <button
          type="submit"
          id="submitBtn"
          class="btn w-100 fw-bold rounded-pill py-2 mb-4"
          style="background-color: #1db954; color: #000; font-size: 17px"
        >
          Log in
        </button>
      </form>

      <!-- LINEA DIVISORE -->

      <div class="d-flex align-items-center gap-3 mb-4">
        <hr class="flex-grow-1 border-secondary" />
        <span class="text-white">or</span>
        <hr class="flex-grow-1 border-secondary" />
      </div>

      <!-- BTN SOCIAL -->

      <div class="d-flex flex-column gap-3 mb-5">
        <button
          class="btn btn-outline-secondary text-white rounded-pill py-2 d-flex align-items-center justify-content-center position-relative"
        >
          <img
            class="position-absolute start-0 ms-3"
            width="30"
            height="30"
            src="https://img.icons8.com/color/48/google-logo.png"
            alt="google-logo"
          />
          Sign up with Google
        </button>

        <button
          class="btn btn-outline-secondary text-white rounded-pill py-2 d-flex align-items-center justify-content-center position-relative"
        >
          <img
            class="position-absolute start-0 ms-3"
            width="30"
            height="30"
            src="https://img.icons8.com/color/48/facebook.png"
            alt="facebook"
          />
          Sign up with Facebook
        </button>

        <button
          class="btn btn-outline-secondary text-white rounded-pill py-2 d-flex align-items-center justify-content-center position-relative"
        >
          <i class="bi bi-apple position-absolute start-0 ms-3 fs-4"></i>
          Sign up with Apple
        </button>
      </div>

      <!-- REGISTRATI -->

      <div class="text-center border-top border-secondary pt-4">
        <p class="text-secondary mb-1">Don't have an account yet?</p>
        <a href="#" class="text-white text-decoration-underline">sign up</a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!--logIn.js-->
  </body>
</html>
