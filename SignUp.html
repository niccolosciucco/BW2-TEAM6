<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Spotify</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="./assets/css/login.css" />
  </head>
  <body>
    <div class="login-box">
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg"
        alt="Spotify"
        class="spotify-logo"
      />

      <h1>Sign up to start listening</h1>

      <div class="mb-3">
        <label for="email">E-mail</label>
        <input
          type="email"
          class="form-control"
          id="email"
          placeholder="E-mail"
        />
      </div>

      <div class="mb-3">
        <label for="password">Password</label>
        <input
          type="password"
          class="form-control"
          id="password"
          placeholder="Password"
        />
      </div>

      <a id="sign-up" class="btn btn-continue" onclick="signUp()">Sign Up</a>

      <div class="divider">or</div>

      <button class="btn btn-outline-social">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
          class="social-icon"
          alt="Google"
        />
        Sign up with Google
      </button>

      <button class="btn btn-outline-social">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg"
          class="social-icon"
          alt="Facebook"
        />
        Sing up with Facebook
      </button>

      <button class="btn btn-outline-social">
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg"
          style="filter: invert(1)"
          class="social-icon"
          alt="Apple"
        />
        Sign Up with Apple
      </button>
    </div>
    <div class="modal" tabindex="-1">
      <div class="modal-dialog">
        <div
          class="modal-content bg-dark border-0 shadow-lg"
          style="background-color: #121212 !important"
        >
          <div class="modal-header border-bottom-0 pt-4 px-4">
            <h5 id="modal-title" class="modal-title text-white fw-bold">
              Attention <i class="bi bi-exclamation-triangle"></i>
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>

          <div class="modal-body px-4">
            <p
              id="problem"
              style="
                color: #1db954;
                font-weight: 700;
                font-size: 1.1rem;
                margin-bottom: 0.5rem;
              "
            >
              Email or Password missing
            </p>
            <p id="check-input" class="text-secondary small">
              Please check your input and try again.
            </p>
          </div>

          <div class="modal-footer border-top-0 pb-4 px-4">
            <button
              id="final-button"
              type="button"
              class="btn px-4 py-2 fw-bold text-white shadow-sm"
              style="
                background-color: #1db954;
                border-radius: 500px;
                border: none;
              "
              data-bs-dismiss="modal"
            >
              I UNDERSTAND
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./scripts/signUp.js"></script>
  </body>
</html>
