<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Account Clone</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="./assets/css/account.css" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark bg-black">
        <div class="container-fluid d-block">
          <div class="row align-items-center g-0">
            <div class="col-auto col-lg-3">
              <a class="navbar-brand m-0" href="./home-page.html">
                <i class="bi bi-spotify fs-1"></i>
              </a>
            </div>

            <div
              class="col flex-grow-1 d-flex justify-content-center px-3 position-relative"
            ></div>
          </div>
        </div>
      </nav>
    </header>
    <main class="text-white">
      <div class="container py-5" style="max-width: 900px">
        <div class="row g-3 mb-4">
          <div class="col-md-12">
            <div class="card spotify-card h-100 p-4 text-white">
              <div class="btn-status">Your plan</div>
              <div class="d-flex align-items-center mb-2">
                <i class="bi bi-spotify me-2"></i>
                <span class="fw-bold">Premium</span>
              </div>
              <h1 class="display-5 fw-bold mb-3 text-purple">Student</h1>
              <p class="mb-1">Your next bill is for €6.49 on 4/28/2026.</p>
              <p class="small opacity-75">Mastercard *** 5136 | 06/26</p>
            </div>
          </div>
        </div>

        <div class="mb-4">
          <h3 class="h5 fw-bold mb-3 text-white">Account</h3>
          <div class="card spotify-card">
            <div class="list-group list-group-flush">
              <a href="#" class="list-group-item spotify-item text-white">
                <div class="icon-box"><i class="bi bi-pencil"></i></div>
                <span class="fw-bold">Edit personal information</span>
                <i class="bi bi-chevron-right chevron"></i>
              </a>
              <a href="#" class="list-group-item spotify-item text-white">
                <div class="icon-box"><i class="bi bi-arrow-repeat"></i></div>
                <span class="fw-bold">Recover playlists</span>
                <i class="bi bi-chevron-right chevron"></i>
              </a>
            </div>
          </div>
        </div>

        <div class="mb-4">
          <h3 class="h5 fw-bold mb-3 text-white">Subscription</h3>
          <div class="card spotify-card">
            <div class="list-group list-group-flush">
              <a href="#" class="list-group-item spotify-item text-white">
                <div class="icon-box"><i class="bi bi-gem"></i></div>
                <span class="fw-bold">Available plans</span>
                <i class="bi bi-chevron-right chevron"></i>
              </a>
              <a href="#" class="list-group-item spotify-item text-white">
                <div class="icon-box"><i class="bi bi-spotify"></i></div>
                <span class="fw-bold">Manage your subscription</span>
                <i class="bi bi-chevron-right chevron"></i>
              </a>
              <a href="#" class="list-group-item spotify-item text-white">
                <div class="icon-box"><i class="bi bi-x-lg"></i></div>
                <span class="fw-bold">Cancel subscription</span>
                <i class="bi bi-chevron-right chevron"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
