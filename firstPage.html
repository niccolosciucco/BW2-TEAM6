<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/firstPage.css" />
  </head>
  <body>
    <div class="container main-container">
      <div class="row align-items-center">
        <div class="col-md-5 text-center">
          <img
            src="https://storage.googleapis.com/pr-newsroom-wp/1/2018/11/Spotify_Logo_RGB_White.png"
            alt="Spotify Logo"
            width="150"
            class="mb-5"
          />

          <h2 class="fw-bold mb-4">Millions of songs.<br />Free on Spotify.</h2>

          <a href="login.html" class="btn btn-spotify mb-4">
            Log In
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              fill="currentColor"
              class="bi bi-box-arrow-up-right ms-1"
              viewBox="0 0 16 16"
            >
              <path
                fill-rule="evenodd"
                d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5z"
              />
              <path
                fill-rule="evenodd"
                d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0v-5z"
              />
            </svg>
          </a>

          <p class="text-muted-custom">
            New to Spotify?
            <a href="./signUp.html" class="fw-bold">Sign up for free.</a>
          </p>

          <div class="mt-5">
            <a href="#" class="text-muted-custom text-decoration-none fw-bold"
              >Settings</a
            >
          </div>
        </div>

        <div class="col-md-2 d-none d-md-block">
          <div class="vr-divider"></div>
        </div>

        <div class="col-md-5 text-center mt-4 mt-md-0">
          <div class="d-flex justify-content-center mb-4">
            <div class="qr-code">
              <img
                src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://spotify.com"
                alt="QR Code"
                class="img-fluid"
              />
            </div>
          </div>

          <h3 class="fw-bold mb-3">
            Scan the code <br />
            to log in
          </h3>

          <p class="text-muted-custom px-4">
            On your mobile device, open the camera or app to scan the QR code.
          </p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
